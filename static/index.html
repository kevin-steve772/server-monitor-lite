<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitor Lite</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo">Server Monitor Lite</div>
        <div class="system-info">
            <span id="hostname">--</span>
            <span>·</span>
            <span id="uptime">--</span>
            <span>·</span>
            <span id="connection-status">连接中...</span>
            <span class="status-dot" id="status-dot"></span>
        </div>
    </header>

    <div class="menubar" id="menubar">
        <span class="menu-item" data-tab="cpu">CPU</span>
        <span class="menu-item" data-tab="memory">内存</span>
        <span class="menu-item" data-tab="disk">磁盘</span>
        <span class="menu-item" data-tab="network">网络</span>
    </div>

    <div id="float-container"></div>
    <script src="/static/js/monitor.js"></script>
</body>
</html>
